<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"/>

  <title>GROUP 1 PC Login</title>

  <link rel="stylesheet" href="./Login.CSS" />

  <link rel="icon" type="image/png" href="../Pic/logo 1.avif"/>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">

    <div class="logo"> GROUP 1 PC </div>

    <div class="menu">

      <ul>

        <li>
          <a href="Home.html">HOME</a>
        </li>

        <li>
          <a href="./laptop.html">LAPTOP</a>
        </li>

        <li>
          <a href="./Accessories .html">ACCESSORIES</a>
        </li>

        <li>
          <a href="./index.html">ABOUT Us</a>
        </li>

      </ul>

    </div>

  </nav>

  <div class="container">

    <!-- Left -->
    <div class="left">

      <div>GROUP 1 PC</div>

      <h2>WELCOME BACK!</h2>

      <div class="input-group">

        <label>Username</label>

        <input
          type="text"
          placeholder="example@gmail.com"/>

      </div>

      <!-- PASSWORD -->
      <div class="input-group">

        <label>Password</label>

        <div class="password-box">

          <input
            type="password"
            id="password"
            placeholder="••••••••"/>

          <i class="fas fa-eye" id="togglePassword"></i>

        </div>

      </div>

      <div class="options">

        <label>
          <input type="checkbox" /> Remember me </label>

        <a href="#"> Forget password?</a>

      </div>

      <button>

        <a href="../code/first.html"> Log In</a>

      </button>

      <p class="login-text">

        Don't have an account?

        <a href="./sign up.html"> Sign up </a>

      </p>

    </div>

    <!-- Right -->
    <div class="right">

      <div class="social">

        <a href="https://t.me/Vy_hak">
          <i class="fab fa-telegram"></i>
        </a>

        <a href="https://www.facebook.com/share/1PNH94iD2F/?mibextid=wwXIfr">
          <i class="fab fa-facebook-f"></i>
        </a>

        <a href="./About me.html" class="back-btn"> ⬅️ Back </a>

      </div>

    </div>

  </div>
  <script>

    const togglePassword =
      document.getElementById("togglePassword");

    const password =
      document.getElementById("password");

    togglePassword.addEventListener("click", () => {

      if (password.type === "password") {

        password.type = "text";

        togglePassword.classList.remove("fa-eye");

        togglePassword.classList.add("fa-eye-slash");

      }

      else {

        password.type = "password";

        togglePassword.classList.remove("fa-eye-slash");

        togglePassword.classList.add("fa-eye");

      }

    });

  </script>

</body>

</html>
