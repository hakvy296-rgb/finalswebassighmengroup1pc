<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"/>

  <title>GROUP 1 PC Sign Up</title>

  <!-- CSS -->
  <link rel="stylesheet" href="./Login.CSS" />

  <!-- ICON -->
  <link rel="icon" type="image/png" href="../Pic/logo 1.avif"/>

  <!-- FONT AWESOME -->
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">

    <div class="logo"> GROUP 1 PC </div>

    <div class="menu">

      <ul>

        <li>
          <a href="Home.html">HOME</a>
        </li>

        <li>
          <a href="./laptop.html">LAPTOP</a>
        </li>

        <li>
          <a href="./Accessories.html">ACCESSORIES</a>
        </li>

        <li>
          <a href="./About me.html">ABOUT ME</a>
        </li>

      </ul>

    </div>

  </nav>

  <!-- MAIN CONTAINER -->
  <div class="container">

    <!-- LEFT -->
    <div class="left">

      <div class="title-logo">
        GROUP 1 PC
      </div>

      <h2>CREATE ACCOUNT</h2>

      <!-- Uername -->
      <div class="input-group">

        <label>Username</label>

        <input
          type="text" placeholder="Username"/>

      </div>

      <!-- EMAIL -->
      <div class="input-group">

        <label>Email</label>

        <input
          type="email"
          placeholder="example@gmail.com"/>

      </div>

      <!-- PASSWORD -->
      <div class="input-group">

        <label>Password</label>

        <div class="password-box">

          <input
            type="password"
            id="password"
            placeholder="••••••••" />

          <i class="fas fa-eye" id="togglePassword"></i>

        </div>

      </div>

      <!-- BUTTON -->
      <button>

        <a href="./Login.html">  Sign Up </a>

      </button>

      <!-- LOGIN -->
      <p class="login-text">

        Already have an account?

        <a href="./Login.html"> Log In </a>

      </p>

    </div>

    <!-- RIGHT -->
    <div class="right">

      <div class="social">

        <!-- TELEGRAM -->
        <a href="https://t.me/Vy_hak">
          <i class="fab fa-telegram"></i>
        </a>

        <!-- FACEBOOK -->
        <a href="https://www.facebook.com/share/1PNH94iD2F/?mibextid=wwXIfr">
          <i class="fab fa-facebook-f"></i>
        </a>

        <!-- BACK BUTTON -->
        <a href="./Login.html" class="back-btn"> ⬅️ Back </a>

      </div>

    </div>

  </div>

  <!-- SHOW PASSWORD SCRIPT -->
  <script>

    const togglePassword =
      document.getElementById("togglePassword");

    const password =
      document.getElementById("password");

    togglePassword.addEventListener("click", () => {

      if (password.type === "password") {

        password.type = "text";

        togglePassword.classList.remove("fa-eye");

        togglePassword.classList.add("fa-eye-slash");

      }

      else {

        password.type = "password";

        togglePassword.classList.remove("fa-eye-slash");

        togglePassword.classList.add("fa-eye");

      }

    });

  </script>

</body>

</html>
